# ##=========================================##
# :#          Nordix - Yggdrasil             #:
# :#   Hyprland Configuration - Animations   #:
# ##=========================================##

# https://wiki.hyprland.org/Configuring/Animations/
#
# SYNTAX:
#   animation = NAME, ENABLED, SPEED, CURVE, [STYLE]
#
#   NAME    = Animation target (see hierarchy below)
#   ENABLED = 1 (on) or 0 (off)
#   SPEED   = 1-10 (lower = faster)
#   CURVE   = Bezier curve name
#   STYLE   = slide, popin, slidefade, slidevert, etc.

# HIERARCHY:
#   Parent animations control children unless specifically overridden.
#   Set children AFTER parent to override.
#
#   windows ─────────┬── windowsIn
#                    ├── windowsOut
#                    └── windowsMove

#   fade ────────────┬── fadeIn
#                    ├── fadeOut
#                    ├── fadeSwitch
#                    ├── fadeShadow
#                    ├── fadeDim
#                    ├── fadeLayersIn
#                    └── fadeLayersOut

#   workspaces ──────┬── workspacesIn
#                    └── workspacesOut

#   specialWorkspace ┬── specialWorkspaceIn
#                    └── specialWorkspaceOut

#   layers ──────────┬── layersIn
#                    └── layersOut

#   border
#   borderangle
#

animations {
    enabled = yes

    # Workspace wraparound animation
    workspace_wraparound = true

##=========================================##
 # BEZIER CURVES
##=========================================##

    # Format: bezier = NAME, X0, Y0, X1, Y1
    # Values should be between 0 and 1 (Y can exceed for overshoot)
    #
    # Test curves: https://www.cssportal.com/css-cubic-bezier-generator/

    # Smooth curves
    bezier = smooth,        0.25, 0.1,  0.25, 1.0
    bezier = smoothIn,      0.25, 1.0,  0.5,  1.0
    bezier = smoothOut,     0.36, 0.0,  0.66, -0.56

    # Overshoot curves (bounce past target, then settle)
    bezier = overshot,      0.05, 0.9,  0.1,  1.1
    bezier = overshotSoft,  0.1,  0.8,  0.2,  1.05
    bezier = overshotHard,  0.05, 0.95, 0.1,  1.2

    # Quick/snappy curves
    bezier = quick,         0.15, 0.0,  0.1,  1.0
    bezier = snappy,        0.2,  0.0,  0.0,  1.0

    # Ease curves
    bezier = easeIn,        0.42, 0.0,  1.0,  1.0
    bezier = easeOut,       0.0,  0.0,  0.58, 1.0
    bezier = easeInOut,     0.42, 0.0,  0.58, 1.0

    # Linear (no easing)
    bezier = linear,        0.0,  0.0,  1.0,  1.0

##=========================================##
 # WINDOW ANIMATIONS
##=========================================##

    # Styles: slide, popin [%], slidefade [%]
    #
    # windows     = Base for all window animations
    # windowsIn   = Window opening
    # windowsOut  = Window closing
    # windowsMove = Window moving/resizing

    animation = windows,     1, 4, smooth
    animation = windowsIn,   1, 4, overshotSoft,  popin 80%
    animation = windowsOut,  1, 3, smoothOut,     popin 80%
    animation = windowsMove, 1, 3, smooth

##=========================================##
 # FADE ANIMATIONS
##=========================================##

    # fade          = Base for all fade animations
    # fadeIn        = Fade in
    # fadeOut       = Fade out
    # fadeSwitch    = Fade when switching workspaces
    # fadeShadow    = Shadow fade
    # fadeDim       = Dim fade (inactive windows)
    # fadeLayersIn  = Layer fade in
    # fadeLayersOut = Layer fade out

    animation = fade,          1, 4, smooth
    animation = fadeIn,        1, 4, smoothIn
    animation = fadeOut,       1, 3, smoothOut
    animation = fadeSwitch,    1, 4, smooth
    animation = fadeShadow,    1, 4, smooth
    animation = fadeDim,       1, 4, smooth
    animation = fadeLayersIn,  1, 4, smoothIn
    animation = fadeLayersOut, 1, 3, smoothOut

##=========================================##
 # BORDER ANIMATIONS
##=========================================##

    # border      = Border color change animation
    # borderangle = Gradient angle rotation (use 'loop' for continuous)

    animation = border,      1, 5, smooth
    animation = borderangle, 1, 50, linear, loop

##=========================================##
 # WORKSPACE ANIMATIONS
##=========================================##
    
    # Styles: slide, slidevert, slidefade, slidefadevert, fade
    #
    # workspaces    = Base for workspace animations
    # workspacesIn  = Switching to workspace
    # workspacesOut = Switching from workspace

    animation = workspaces,    1, 4, smooth,   slidefade
    animation = workspacesIn,  1, 4, overshot, slidefade
    animation = workspacesOut, 1, 3, smooth,   slidefade

##=========================================##
 # SPECIAL WORKSPACE ANIMATIONS
##=========================================##

    # Styles: slide, slidevert, slidefade, slidefadevert, fade
    # Direction: top, bottom, left, right
    #
    # specialWorkspace    = Base for special workspace
    # specialWorkspaceIn  = Opening special workspace
    # specialWorkspaceOut = Closing special workspace

    animation = specialWorkspace,    1, 5, overshot,  slidefade top
    animation = specialWorkspaceIn,  1, 5, overshot,  slidefade top
    animation = specialWorkspaceOut, 1, 4, smooth,    slidefade top

##=========================================##
    # LAYER ANIMATIONS
##=========================================##

    # Layers = app launchers, bars, notifications, overlays
    # Styles: slide, slidevert, slidefade, slidefadevert, fade
    
    # layers    = Base for layer animations
    # layersIn  = Layer appearing
    # layersOut = Layer disappearing

    animation = layers,    1, 4, smooth,   slidefade
    animation = layersIn,  1, 4, overshot, slidefade
    animation = layersOut, 1, 3, smooth,   slidefade
}
